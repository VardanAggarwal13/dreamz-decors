<!doctype html>
<!--
  Source artwork for the 1200×630 social share image (public/og-default.jpg).
  Rendered to JPEG by scripts/generate-og.mjs (Playwright). Edit here, then run
  `npm run og` to regenerate. Colors mirror the brand tokens in src/index.css.
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: rgb(22 22 22);
        --ink-soft: rgb(90 87 81);
        --bone: rgb(247 243 236);
        --bone-muted: rgb(239 232 220);
        --hairline: rgb(226 218 203);
        --gold: rgb(197 158 89);
        --gold-light: rgb(230 205 145);
        --gold-deep: rgb(161 127 55);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        font-family: 'Inter', system-ui, sans-serif;
        background:
          radial-gradient(circle at 82% 18%, rgba(197, 158, 89, 0.12), transparent 46%),
          radial-gradient(circle at 12% 92%, rgba(197, 158, 89, 0.08), transparent 40%),
          linear-gradient(135deg, #ffffff 0%, var(--bone) 55%, var(--bone-muted) 100%);
        color: var(--ink);
        position: relative;
        overflow: hidden;
      }
      /* Thin gold frame */
      .frame {
        position: absolute;
        inset: 28px;
        border: 1px solid var(--hairline);
        border-radius: 18px;
      }
      .frame::before {
        content: '';
        position: absolute;
        inset: -1px;
        border-radius: 18px;
        padding: 1px;
        background: linear-gradient(120deg, transparent 30%, rgba(197, 158, 89, 0.55) 50%, transparent 70%);
        -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
      }
      .stage {
        position: absolute;
        inset: 28px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 92px;
      }
      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.34em;
        text-transform: uppercase;
        color: var(--gold-deep);
        margin-bottom: 30px;
      }
      .eyebrow .rule {
        width: 46px;
        height: 1px;
        background: linear-gradient(90deg, var(--gold), transparent);
      }
      h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700;
        font-size: 104px;
        line-height: 0.98;
        letter-spacing: -0.5px;
        color: var(--ink);
      }
      h1 .accent {
        background: linear-gradient(100deg, var(--gold-deep), var(--gold), var(--gold-light));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .tagline {
        margin-top: 30px;
        font-size: 30px;
        font-weight: 500;
        line-height: 1.4;
        color: var(--ink-soft);
        max-width: 760px;
      }
      .meta {
        position: absolute;
        left: 92px;
        bottom: 70px;
        display: flex;
        align-items: center;
        gap: 20px;
        font-size: 19px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--ink);
      }
      .meta .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
      .meta .muted { color: var(--ink-soft); font-weight: 500; }
      .domain {
        position: absolute;
        right: 92px;
        bottom: 70px;
        font-size: 19px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--gold-deep);
      }
    </style>
  </head>
  <body>
    <div class="frame"></div>
    <div class="stage">
      <span class="eyebrow"><span class="rule"></span>Premium Wall Art Studio</span>
      <h1>Dreamz<span class="accent">Decors</span></h1>
      <p class="tagline">
        Gallery sets, gold-foil finishing &amp; statement bundles, crafted for modern Indian homes.
      </p>
    </div>
    <div class="meta">
      <span>Gold-Foil Finishing</span><span class="dot"></span>
      <span class="muted">Secure Packaging</span><span class="dot"></span>
      <span class="muted">Pan-India Delivery</span>
    </div>
    <div class="domain">dreamzdecors.com</div>
  </body>
</html>
